<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eiger E51">
<meta name="theme-color" content="#0f1923">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Eiger Ultra E51</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#0f1923;--blue:#1A3C6E;--blue-mid:#2a5fa8;
  --orange:#E07B39;--orange-l:#f5a96a;
  --cream:#f8f5f0;--muted:#6b7280;--border:#e5e0d8;
  --green:#2e7d5e;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--ink);min-height:100vh;overscroll-behavior:none;}
input,textarea,select{font-family:inherit;}

/* ── AUTH SCREEN ── */
#auth-screen{
  display:none;position:fixed;inset:0;background:var(--ink);z-index:1000;
  align-items:center;justify-content:center;flex-direction:column;padding:32px;
}
#auth-screen.visible{display:flex;}
.auth-card{background:#161f2e;border:1px solid #1e2d42;border-radius:20px;padding:32px;width:100%;max-width:360px;text-align:center;}
.auth-logo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;color:white;margin-bottom:4px;}
.auth-logo span{color:var(--orange);}
.auth-sub{font-size:13px;color:#7090b0;margin-bottom:28px;line-height:1.5;}
.auth-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#4a6080;text-align:left;margin-bottom:6px;display:block;}
.auth-input{width:100%;border:1px solid #2a3a50;border-radius:10px;padding:12px 14px;font-size:15px;color:white;background:#0f1923;margin-bottom:14px;}
.auth-input:focus{outline:none;border-color:var(--orange);}
.auth-btn{width:100%;padding:13px;background:var(--orange);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.auth-btn:hover{opacity:.88;}
.auth-btn:disabled{opacity:.45;cursor:not-allowed;}
.auth-msg{font-size:12px;margin-top:14px;line-height:1.5;min-height:18px;}
.auth-msg.ok{color:#34d399;}
.auth-msg.err{color:#f87171;}

/* ── SYNC INDICATOR ── */
.sync-dot{width:7px;height:7px;border-radius:50%;background:#34d399;flex-shrink:0;transition:background .3s;}
.sync-dot.syncing{background:var(--orange);animation:pulse .8s infinite;}
.sync-dot.offline{background:#6b7280;}
.sync-dot.error{background:#f87171;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ── TOP BAR ── */
.top-bar{
  background:var(--ink);padding:0 16px;
  padding-top:var(--safe-top);
  display:flex;align-items:center;justify-content:space-between;
  height:calc(52px + var(--safe-top));
  border-bottom:1px solid #1e2d42;position:sticky;top:0;z-index:200;
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;color:white;}
.logo span{color:var(--orange);}
.top-right{display:flex;align-items:center;gap:10px;}
.countdown-pill{display:flex;align-items:center;gap:6px;background:rgba(224,123,57,.1);border:1px solid rgba(224,123,57,.22);border-radius:7px;padding:4px 10px;}
.cddays{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--orange);line-height:1;}
.cdlabel{font-size:8px;color:rgba(245,169,106,.55);letter-spacing:1px;text-transform:uppercase;}
.user-btn{border:none;background:rgba(255,255,255,.06);color:#7090b0;border-radius:7px;padding:5px 9px;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:5px;}
.user-btn:hover{background:rgba(255,255,255,.1);}

/* ── LAYOUT ── */
.main{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 52px - var(--safe-top));}

/* ── SIDEBAR ── */
.sidebar{background:#131c28;overflow-y:auto;border-right:1px solid #1e2d42;-webkit-overflow-scrolling:touch;}
.sidebar::-webkit-scrollbar{width:2px;}
.sidebar::-webkit-scrollbar-thumb{background:#2a3a50;border-radius:2px;}
.phase-lbl{padding:12px 14px 4px;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#3a5070;display:flex;align-items:center;gap:5px;}
.phase-lbl .dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.wbtn{width:100%;padding:11px 14px 11px 20px;display:flex;align-items:center;justify-content:space-between;border:none;background:transparent;cursor:pointer;text-align:left;transition:background .1s;position:relative;}
.wbtn:hover{background:rgba(255,255,255,.03);}
.wbtn.active{background:rgba(26,60,110,.3);border-left:2px solid #4a8fe8;}
.wbtn .wn{font-size:12px;color:#7090b0;}
.wbtn.active .wn{color:#c8dcf4;font-weight:600;}
.wbtn .wd{font-size:9px;color:#3a5070;font-family:'DM Mono',monospace;}
.wbtn.active .wd{color:#5880a8;}
.wprog{position:absolute;bottom:0;left:20px;right:0;height:2px;background:#1e2d42;}
.wprog-fill{height:100%;background:#34d399;border-radius:1px;transition:width .3s;}
.stag{font-size:7px;font-weight:700;letter-spacing:.8px;border-radius:3px;padding:2px 4px;text-transform:uppercase;}
.stag-rec{background:rgba(107,63,160,.25);color:#b08de0;}
.stag-peak{background:rgba(224,123,57,.25);color:var(--orange-l);}
.stag-race{background:rgba(185,28,28,.3);color:#fca5a5;}

/* ── CONTENT ── */
.content{background:var(--cream);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.content::-webkit-scrollbar{width:4px;}
.content::-webkit-scrollbar-thumb{background:#d0c8bc;border-radius:3px;}
.ci{padding:20px 22px;max-width:860px;}

/* ── WEEK HERO ── */
.whero{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;}
.whead{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--blue);letter-spacing:2px;line-height:1;}
.wsub{font-size:11px;color:var(--muted);margin-top:2px;}
.krow{display:flex;gap:7px;flex-wrap:wrap;align-items:flex-start;}
.kpi{background:white;border:1px solid var(--border);border-radius:8px;padding:7px 11px;text-align:center;min-width:64px;}
.kpi .kv{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--blue);line-height:1;}
.kpi .kl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}
.kpi.acc .kv{color:var(--orange);}

/* ── PHASE BANNER ── */
.pbanner{border-radius:9px;padding:10px 14px;margin-bottom:16px;border-left:3px solid;display:flex;align-items:flex-start;gap:8px;}
.pbanner .pbi{font-size:15px;flex-shrink:0;margin-top:1px;}
.pbanner .pbt{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;}
.pbanner .pbd{font-size:11px;line-height:1.5;opacity:.9;}

/* ── SECTION HEAD ── */
.sh{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin:18px 0 8px;display:flex;align-items:center;gap:8px;}
.sh::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── SCHEDULE GRID ── */
.sgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px;}
.dslot{background:white;border:2px dashed #ddd;border-radius:9px;min-height:92px;padding:6px;display:flex;flex-direction:column;transition:all .15s;position:relative;}
.dslot.drag-over{border-color:var(--orange);background:#fff8f3;}
.dslot.has-s{border-style:solid;border-color:var(--border);}
.dslot.done-s{border-color:#34d399;background:#f0fdf8;}
.dslot.today{border-color:rgba(224,123,57,.4);}
.dslot-day{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.dslot.today .dslot-day{color:var(--orange);}
.dslot-date{font-size:8px;color:#bbb;font-family:'DM Mono',monospace;margin-bottom:3px;}
.achip{flex:1;border-radius:6px;padding:4px 5px;display:flex;flex-direction:column;justify-content:space-between;min-height:40px;}
.acht{font-size:9px;font-weight:600;line-height:1.2;color:var(--ink);}
.achv{font-size:8px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px;}
.achbtns{display:flex;gap:3px;margin-top:4px;}
.achbtn{flex:1;border:none;border-radius:6px;padding:5px 0;font-size:9px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.3px;}
.achbtn-log{background:var(--orange);color:white;}
.achbtn-done{background:#dcfce7;color:#166534;}
.achbtn-done.is-done{background:#34d399;color:white;}
.achbtn-rm{background:#fee2e2;color:#b91c1c;max-width:22px;}
.eslot{flex:1;display:flex;align-items:center;justify-content:center;font-size:8px;color:#ccc;text-align:center;line-height:1.3;}

/* ── POOL ── */
.pool-intro{background:#fffbf5;border:1px solid #f0d9bc;border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:#7a4a18;display:flex;align-items:flex-start;gap:6px;line-height:1.5;}
.scards{display:flex;flex-direction:column;gap:7px;}
.scard{background:white;border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:box-shadow .15s;cursor:grab;}
.scard:active{cursor:grabbing;}
.scard.dragging{opacity:.4;}
.scard.used{opacity:.55;}
.sc-hdr{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sc-l{display:flex;align-items:center;gap:8px;flex:1;min-width:0;}
.sc-ico{font-size:16px;flex-shrink:0;}
.sc-ttl{font-size:13px;font-weight:600;color:var(--ink);line-height:1.2;}
.sc-vol{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px;}
.sc-r{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.sc-bdg{font-size:8px;font-weight:700;letter-spacing:.5px;border-radius:4px;padding:2px 6px;text-transform:uppercase;white-space:nowrap;}
.sc-asgn{padding:7px 14px;border-radius:7px;border:1px solid var(--orange);background:rgba(224,123,57,.08);color:var(--orange);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
.sc-asgn:hover{background:rgba(224,123,57,.16);}
.sc-exp{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;}
.sc-body{display:none;padding:0 12px 10px;border-top:1px solid #f3f0ea;}
.sc-body.open{display:block;padding-top:9px;}
.sc-desc{font-size:11px;color:var(--muted);line-height:1.65;margin-bottom:8px;}
.hrzones{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.hz{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;}
.extbl{width:100%;border-collapse:collapse;}
.extbl tr{border-bottom:1px solid #f3f0ea;}
.extbl tr:last-child{border-bottom:none;}
.extbl td{padding:5px 0;font-size:11px;}
.extbl .exd{width:14px;}
.extbl .exd span{width:4px;height:4px;border-radius:50%;background:var(--orange);display:inline-block;}
.extbl .exn{color:var(--ink);font-weight:500;}
.extbl .exs{color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;text-align:right;}
.nutnote{background:#fff8f0;border:1px solid #fad5bc;border-radius:6px;padding:7px 10px;font-size:10px;color:#854d0e;display:flex;gap:5px;margin-top:7px;line-height:1.5;}

/* ── WEEK NOTES ── */
.wnotes{background:white;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:8px;}
.nitem{display:flex;gap:8px;padding:5px 0;font-size:11px;color:#333;border-bottom:1px solid #f3f0ea;line-height:1.5;}
.nitem:last-child{border-bottom:none;}
.narr{color:var(--orange);font-weight:700;flex-shrink:0;}

/* ── COMPLETION ── */
.cbar-wrap{background:#eee;border-radius:3px;height:5px;overflow:hidden;margin-top:5px;}
.cbar-fill{height:100%;background:#34d399;border-radius:3px;transition:width .4s;}
.clbl{font-size:9px;color:var(--muted);margin-top:3px;}

/* ═══════════════ SESSION LOG MODAL ═══════════════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:white;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:92vh;display:flex;flex-direction:column;padding-bottom:var(--safe-bot);}
.modal-top{padding:16px 18px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;}
.modal-top h3{font-size:17px;font-weight:700;color:var(--ink);line-height:1.2;}
.modal-top .msub{font-size:11px;color:var(--muted);margin-top:2px;}
.modal-close{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--cream);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.modal-body{overflow-y:auto;padding:14px 18px;flex:1;-webkit-overflow-scrolling:touch;}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);flex-shrink:0;}
.mtabs{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.mtab{flex:1;padding:11px 0;text-align:center;font-size:12px;font-weight:600;border:none;background:white;cursor:pointer;color:var(--muted);transition:all .15s;}
.mtab.active{background:var(--blue);color:white;}

/* ── GYM LOG ── */
.ex-log-block{margin-bottom:14px;border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.ex-log-head{background:#f8f5f0;padding:8px 12px;font-size:12px;font-weight:600;color:var(--ink);display:flex;align-items:center;justify-content:space-between;}
.ex-log-head .explan{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.sets-table{width:100%;border-collapse:collapse;}
.sets-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);}
.sets-table th.tc{text-align:center;}
.sets-table td{padding:5px 6px;border-bottom:1px solid #f5f5f5;vertical-align:middle;}
.sets-table tr:last-child td{border-bottom:none;}
.set-num{font-size:11px;font-weight:600;color:var(--muted);text-align:center;width:24px;}
.set-inp{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 7px;font-size:15px;font-weight:600;text-align:center;color:var(--ink);background:white;-webkit-appearance:none;}
.set-inp:focus{outline:none;border-color:var(--orange);}
.set-inp.pr-glow{border-color:#34d399;background:#f0fdf8;}
.set-done-cb{width:36px;height:36px;border:2px solid var(--border);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:white;transition:all .15s;margin:0 auto;}
.set-done-cb.checked{background:var(--green);border-color:var(--green);}
.set-done-cb.checked::after{content:'✓';color:white;font-size:13px;font-weight:700;}
.pr-badge{font-size:8px;font-weight:700;background:#fef08a;color:#854d0e;border-radius:3px;padding:1px 4px;margin-left:4px;}
.add-set-btn{width:100%;padding:7px;border:none;background:transparent;color:var(--orange);font-size:11px;font-weight:600;cursor:pointer;border-top:1px solid var(--border);}

/* ── RUN LOG ── */
.run-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rfield{display:flex;flex-direction:column;gap:4px;}
.rfield.full{grid-column:1/-1;}
.rfield label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.rfield input,.rfield textarea{border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:14px;color:var(--ink);background:white;-webkit-appearance:none;}
.rfield input:focus,.rfield textarea:focus{outline:none;border-color:var(--orange);}
.rfield textarea{resize:none;min-height:56px;line-height:1.5;}
.rfield .unit{font-size:9px;color:var(--muted);margin-top:1px;}
.feeling-row{display:flex;gap:6px;margin-top:4px;}
.feeling-btn{flex:1;border:2px solid var(--border);border-radius:8px;padding:6px 2px;text-align:center;cursor:pointer;background:white;font-size:18px;transition:all .12s;}
.feeling-btn.sel{border-color:var(--orange);background:#fff8f3;}

/* ── LOG HISTORY ── */
.log-entry{background:var(--cream);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.log-entry-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px;}
.log-entry-title{font-size:12px;font-weight:600;color:var(--ink);}
.log-entry-date{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.log-entry-del{border:none;background:none;color:#ccc;font-size:14px;cursor:pointer;padding:0 2px;}
.log-sets{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.log-set-chip{font-size:10px;background:white;border:1px solid var(--border);border-radius:5px;padding:2px 7px;font-family:'DM Mono',monospace;}
.log-set-chip.done-set{border-color:#34d399;background:#f0fdf8;color:#166534;}
.log-run-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:6px;}
.lrg-item{text-align:center;background:white;border:1px solid var(--border);border-radius:6px;padding:4px 6px;}
.lrg-val{font-size:13px;font-weight:600;color:var(--blue);font-family:'DM Mono',monospace;}
.lrg-lbl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

/* ── ASSIGN MODAL ── */
.assign-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center;}
.assign-overlay.open{display:flex;}
.assign-modal{background:white;border-radius:16px;padding:20px;width:300px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.assign-modal h3{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.assign-modal .asub{font-size:11px;color:var(--muted);margin-bottom:14px;}
.dpicker{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px;}
.dpday{border:2px solid var(--border);border-radius:7px;padding:8px 2px;text-align:center;cursor:pointer;transition:all .12s;background:white;}
.dpday:hover{border-color:var(--orange);background:#fff8f3;}
.dpday.sel{border-color:var(--orange);background:var(--orange);color:white;}
.dpday.occ{opacity:.35;cursor:not-allowed;}
.dpday .ddn{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.dpday .ddd{font-size:8px;opacity:.7;font-family:'DM Mono',monospace;margin-top:1px;}
.amodal-btns{display:flex;gap:7px;}
.abtn{flex:1;padding:9px;border-radius:7px;border:none;font-size:12px;font-weight:600;cursor:pointer;}
.abtn-cancel{background:var(--cream);color:var(--muted);border:1px solid var(--border);}
.abtn-ok{background:var(--orange);color:white;}
.abtn-ok:disabled{opacity:.4;cursor:not-allowed;}

/* ── SAVE BTN ── */
.save-btn{width:100%;padding:12px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.save-btn:hover{opacity:.9;}
.save-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── RACE HERO ── */
.race-hero{background:linear-gradient(135deg,var(--blue) 0%,#081426 100%);border-radius:13px;padding:28px;text-align:center;margin-bottom:16px;}
.race-hero h1{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--orange);letter-spacing:5px;line-height:1;}
.race-hero p{color:rgba(255,255,255,.65);font-size:12px;margin-top:5px;line-height:1.6;}

@media(max-width:640px){
  .main{grid-template-columns:1fr;height:auto;}
  .sidebar{display:flex;overflow-x:auto;overflow-y:hidden;height:52px;padding:0 6px;border-right:none;border-bottom:1px solid #1e2d42;align-items:center;gap:3px;}
  .phase-lbl{display:none;}
  .wbtn{padding:4px 8px;border-radius:5px;white-space:nowrap;min-width:58px;}
  .ci{padding:14px 13px;}
  .run-fields{grid-template-columns:1fr;}
  .rfield.full{grid-column:1;}
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="visible">

// Per-session custom exercise selections — persisted in localStorage
// { 'str-a': [exObj, exObj, ...], 'str-b': [...] }
function loadCustomExercises() {
  try { return JSON.parse(localStorage.getItem('eiger-custom-ex') || '{}'); } catch { return {}; }
}
function saveCustomExercises() { localStorage.setItem('eiger-custom-ex', JSON.stringify(customExercises)); }
let customExercises = loadCustomExercises();

function getActiveExercises(sessId, baseList, phase) {
  const custom = customExercises[sessId];
  const base = phase >= 4 ? baseList.map(redEx) : baseList;
  if (!custom || custom.length !== base.length) return base;
  // Apply phase reduction to custom exercises too
  return custom.map(ex => phase >= 4 ? redEx(ex) : ex);
}

function swapExercise(sessId, slotIdx, ex) {
  const isA = sessId === 'str-a';
  const base = isA ? STR_LOWER : STR_UPPER;
  if (!customExercises[sessId]) customExercises[sessId] = [...base];
  customExercises[sessId][slotIdx] = ex;
  saveCustomExercises();
  // Rebuild logSets for swapped exercise
  if (logCtx && logCtx.sessionId === sessId) {
    const m = ex.plan.match(/(\d+)\s*[×x]\s*([\d–]+)/);
    const cnt = m ? parseInt(m[1]) : 3;
    logSets[slotIdx] = Array.from({ length: cnt }, () => ({ reps: '', weight: '', done: false }));
  }
  closeSwapModal();
  renderLogBody();
}

function resetExercises(sessId) {
  delete customExercises[sessId];
  saveCustomExercises();
  // Reset logSets
  if (logCtx) {
    const isA = sessId === 'str-a';
    const base = isA ? STR_LOWER : STR_UPPER;
    base.forEach((ex, i) => {
      const m = ex.plan.match(/(\d+)\s*[×x]\s*([\d–]+)/);
      const cnt = m ? parseInt(m[1]) : 3;
      logSets[i] = Array.from({ length: cnt }, () => ({ reps: '', weight: '', done: false }));
    });
  }
  closeSwapModal();
  renderLogBody();
}

// Safe exercise store — avoids inline JSON quoting bugs in onclick attributes
const _exStore = {};
function _storeEx(ex) {
  const k = 'ex_' + Math.random().toString(36).slice(2, 9);
  _exStore[k] = ex;
  return k;
}
function _pickEx(k) {
  const ex = _exStore[k];
  if (!ex || !swapCtx) return;
  swapExercise(swapCtx.sessId, swapCtx.slotIdx, ex);
}

function openSwapModal(sessId, slotIdx) {

  const ph = logCtx ? phN(logCtx.weekNum) : 1;
  const activeExs = getActiveExercises(sessId, isA ? STR_LOWER : STR_UPPER, ph);
  const currentName = activeExs[slotIdx] ? activeExs[slotIdx].name : '';
  const all = [lib.recommended, ...lib.alternatives];
  let h = '<div style="padding:0 0 10px">';
  h += '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:12px">Choose Exercise for Slot ' + (slotIdx + 1) + '</div>';

    const border = isCur ? 'var(--orange)' : isRec ? '#34d399' : 'var(--border)';
    const bg = isCur ? '#fff8f3' : isRec ? '#f0fdf8' : 'white';
    const k = _storeEx(ex);
    let tag = '';
    if (isRec && isCur) tag = '<span style="font-size:8px;font-weight:700;background:#dcfce7;color:#166534;border-radius:3px;padding:2px 5px">✓ ACTIVE</span>';

    else if (isCur)    tag = '<span style="font-size:8px;font-weight:700;background:#fff0e0;color:#c05a1a;border-radius:3px;padding:2px 5px">CURRENT</span>';
    h += '<div onclick="_pickEx(\'' + k + '\')" style="border:2px solid ' + border + ';background:' + bg + ';border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:13px;font-weight:600;color:var(--ink);flex:1">' + ex.name + '</span>' + tag + '</div>';

  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'offline' ? ' offline' : state === 'error' ? ' error' : '');

  document.getElementById('auth-btn').disabled = true;
  document.getElementById('auth-msg').className = 'auth-msg';
  document.getElementById('auth-msg').textContent = isSignUp ? 'Creating account…' : 'Signing in…';

    ? await sb.auth.signUp({ email, password })
    : await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('auth-msg').className = 'auth-msg err';
    document.getElementById('auth-msg').textContent = error.message;
    document.getElementById('auth-btn').disabled = false;
  } else if (isSignUp) {
    document.getElementById('auth-msg').className = 'auth-msg ok';
    document.getElementById('auth-msg').textContent = 'Account created! Signing you in…';
  }
  // onAuthStateChange handles the rest
}

// ─── DATA LAYER ───────────────────────────────────────────────
async function loadAllData() {
  syncState('syncing', 'loading…');
  try {
    const [{ data: schRows }, { data: logRows }] = await Promise.all([
      sb.from('schedule').select('*').eq('user_id', currentUser.id),
      sb.from('session_logs').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false }),
    ]);
    scheduleCache = {};
    (schRows || []).forEach(r => { scheduleCache[`w${r.week_num}_${r.day_index}`] = r; });
    logsCache = logRows || [];
    cacheToLocal();
    syncState('', 'synced');
  } catch (e) {
    loadFromLocal();
    syncState('offline', 'offline');
  }
  render();
}

async function upsertSchedule(weekNum, dayIdx, sessionId, done = false) {
  const key = `w${weekNum}_${dayIdx}`;
  const existing = scheduleCache[key];
  const row = { user_id: currentUser.id, week_num: weekNum, day_index: dayIdx, session_id: sessionId, done, updated_at: new Date().toISOString() };
  // Optimistic update
  scheduleCache[key] = { ...row, id: existing?.id };
  cacheToLocal(); render();
  syncState('syncing', 'saving…');
  try {
    if (existing?.id) {
      await sb.from('schedule').update({ session_id: sessionId, done, updated_at: row.updated_at }).eq('id', existing.id);
    } else {
      const { data } = await sb.from('schedule').insert(row).select().single();
      if (data) scheduleCache[key] = data;
    }
    syncState('', 'synced');
  } catch { syncState('error', 'sync error'); }
  cacheToLocal();
}

async function deleteSchedule(weekNum, dayIdx) {
  const key = `w${weekNum}_${dayIdx}`;
  const existing = scheduleCache[key];
  delete scheduleCache[key];
  cacheToLocal(); render();
  if (existing?.id) {
    syncState('syncing', 'saving…');
    try { await sb.from('schedule').delete().eq('id', existing.id); syncState('', 'synced'); }
    catch { syncState('error', 'sync error'); }
  }
}

async function setDone(weekNum, dayIdx, done) {
  const key = `w${weekNum}_${dayIdx}`;
  if (!scheduleCache[key]) return;
  scheduleCache[key].done = done;
  cacheToLocal(); render();
  syncState('syncing', 'saving…');
  try {
    await sb.from('schedule').update({ done, updated_at: new Date().toISOString() }).eq('id', scheduleCache[key].id);
    syncState('', 'synced');
  } catch { syncState('error', 'sync error'); }
}

async function insertLog(logData) {
  const row = { user_id: currentUser.id, ...logData, created_at: new Date().toISOString() };
  logsCache.unshift(row);
  cacheToLocal();
  syncState('syncing', 'saving…');
  try {
    const { data } = await sb.from('session_logs').insert({ ...row }).select().single();
    if (data) { logsCache[0] = data; cacheToLocal(); }
    syncState('', 'synced');
  } catch { syncState('error', 'sync error'); }
}

async function deleteLog(logId) {
  logsCache = logsCache.filter(l => l.id !== logId);
  cacheToLocal();
  syncState('syncing', 'saving…');
  try { await sb.from('session_logs').delete().eq('id', logId); syncState('', 'synced'); }
  catch { syncState('error', 'sync error'); }
  renderLogBody();
}

// ─── HELPERS ─────────────────────────────────────────────────
const phN = w => w<=4?1:w<=9?2:w<=14?3:w<=16?4:5;
const isRec = w => [4,8,13].includes(w);
const isPeak = w => [11,13].includes(w);
const getPhase = w => PHASES.find(p => p.weeks.includes(w));
function dateOfWeek(w, d=0) { const dt=new Date(START_DATE); dt.setDate(dt.getDate()+(w-1)*7+d); return dt; }
const fmt = d => d.toLocaleDateString('en-CH',{day:'numeric',month:'short'});
const fmtL = d => d.toLocaleDateString('en-CH',{weekday:'short',day:'numeric',month:'short'});
function getVol(w) { const v=["35–40","38–43","41–46","28–32","44–49","47–52","50–55","34–38","52–57","55–60","60–65","55–60","40–45","58–63","48–53","43–48","26–30","Race"]; return v[w-1]+(w<18?" km":""); }
const psStyle = w => [null,{bg:"#eef3fb",bd:"#2a5fa8",tc:"#1a3c6e"},{bg:"#eef8f4",bd:"#2e7d5e",tc:"#166534"},{bg:"#fff8f3",bd:"#c05a1a",tc:"#7c2d12"},{bg:"#f5eeff",bd:"#6b3fa0",tc:"#4c1d95"},{bg:"#fef2f2",bd:"#b91c1c",tc:"#7f1d1d"}][phN(w)];
function psDesc(w) { const r=isRec(w),pk=isPeak(w); const d=[null,"80% of running in Z2 (118–165 bpm). Build base, accumulate vert.","Volume increases. Back-to-back runs begin. Race nutrition practice starts.","Maximum volume. Weeks 11 & 13 have peak long runs (35–38 km).","Consolidate fitness. Strength shifts to maintenance.","Taper. Volume drops. Arrive fresh."][phN(w)]; return d+(r?" ⟶ Recovery week: −30%":"")+(pk?" ⟶ Peak long run week.":""); }

function getWSched(w) {
  const result = {};
  for (let di = 0; di < 7; di++) {
    const row = scheduleCache[`w${w}_${di}`];
    if (row) result[di] = row;
  }
  return result;
}

function getBest(exName) {
  let best = 0;
  logsCache.forEach(log => {
    if (log.type === 'gym' && log.data?.sets?.[exName]) {
      log.data.sets[exName].forEach(s => { if (s.done && parseFloat(s.weight) > best) best = parseFloat(s.weight); });
    }
  });
  return best;
}

function wCompletion(w) {
  const wkS = getWSched(w);
  const t = Object.keys(wkS).length;
  const d = Object.values(wkS).filter(v => v.done).length;
  return { t, d };
}

// ─── SESSION POOL ─────────────────────────────────────────────
function buildPool(w) {
  const ph=phN(w),rec=isRec(w),pk=isPeak(w);
  const sA=getActiveExercises('str-a', STR_LOWER, ph);
  const sB=getActiveExercises('str-b', STR_UPPER, ph);
  const longD=rec?"18–22 km":ph===1?"22–28 km":ph===2?"28–33 km":ph===3?"30–35 km":ph===4?"26–32 km":"18–22 km";
  const eS=ph<=2?"8–11 km":ph===3?"10–13 km":"7–10 km";
  const eM=ph<=2?"11–14 km":ph===3?"14–17 km":"10–13 km";
  const tV=ph<=2?"10–13 km":"13–16 km";
  const b2V=ph===2?"10–13 km":"12–16 km";
  const pool=[];
  pool.push({id:"easy-s",icon:"🟢",title:"Easy Z2 Run — Short",badge:"Z2 Easy",bb:"#eef8f4",bc:"#166634",vol:eS,type:"run",hrZones:["Z2"],nutrition:false,desc:`Fully conversational, Z2 (118–165 bpm). Walk if HR exceeds 165. Your ~7:30/km Z2 pace improves naturally with consistent base training.`});
  pool.push({id:"easy-m",icon:"🟢",title:"Easy Z2 Run — Medium",badge:"Z2 Easy",bb:"#eef8f4",bc:"#166634",vol:eM,type:"run",hrZones:["Z2"],nutrition:false,desc:`Longer easy run, entirely Z2. Option: 15–20 min treadmill at 8–10% incline mid-run to add weekday vert.`});
  pool.push({id:"vert",icon:"⛰️",title:"Vert-Focus Easy Run",badge:"Vert",bb:"#f0fdf4",bc:"#15803d",vol:eS,type:"run",hrZones:["Z2"],nutrition:false,desc:`Z2 with deliberate vertical. Staircase repeats (3–5×10–15 min), treadmill 8–12% grade, or weighted vest (10–12 kg). HR stays in Z2.`});
  pool.push({id:"long",icon:"🏔️",title:"Long Run",badge:"Long",bb:"#eef8f4",bc:"#166634",vol:longD,type:"run",hrZones:["Z1","Z2"],nutrition:true,desc:`Key weekly session. Z2 throughout. Walk every uphill. Fuel at 30 min, then every 40–45 min.`});
  if(ph===3&&pk) pool.push({id:"peak",icon:"⚡",title:"Peak Long Run — Race Sim",badge:"PEAK",bb:"#fff3e0",bc:"#c05a1a",vol:"35–38 km",type:"run",hrZones:["Z2"],nutrition:true,desc:`One of only 2 runs over 35 km. Race gear, poles, nutrition every 30–40 min, 1,500–2,000 m D+. Z2 pace.`});
  if(!rec&&ph>=2) pool.push({id:"b2b",icon:"🔁",title:"Back-to-Back Easy Run",badge:"B2B",bb:"#f5eeff",bc:"#6b3fa0",vol:b2V,type:"run",hrZones:["Z1","Z2"],nutrition:false,desc:`On tired legs, day after long run. Shuffle pace, Z1–Z2. Most race-specific session in the plan.`});
  if(!rec) pool.push({id:"tempo",icon:"🟡",title:"Tempo Run",badge:"Tempo",bb:"#fffbeb",bc:"#92400e",vol:tV,type:"run",hrZones:["Z2","Z3"],nutrition:false,desc:ph<=2?`Max 1/week. Warmup 10 min Z2 → 2–3×10 min Z3 (166–180) with 3 min recovery → cooldown.`:`Max 1/week. Warmup 10 min Z2 → 2×20 min Z3 (166–180) with 4 min recovery → cooldown.`});
  if(!rec&&ph>=2) pool.push({id:"hills",icon:"💨",title:"Hill Sprint Strides",badge:"Power",bb:"#fff8ee",bc:"#b45309",vol:"+ 15–20 min",type:"run",hrZones:["Z2","Z4"],nutrition:false,desc:`Add to end of easy run. 8–10×20 sec uphill sprint, full walk recovery. Max once/week.`});
  pool.push({id:"str-a",icon:"🏋️",title:"Strength A — Lower Body",badge:"Strength",bb:"#fefce8",bc:"#854d0e",vol:"50–55 min",type:"gym",exercises:sA,nutrition:false,desc:`Lower body power. Eccentric control (4s lower) on split squats and single-leg squats.`});
  pool.push({id:"str-b",icon:"💪",title:"Strength B — Upper Body & Core",badge:"Strength",bb:"#fefce8",bc:"#854d0e",vol:"50–55 min",type:"gym",exercises:sB,nutrition:false,desc:`Shoulder press, pull-ups, lateral raises always included. Core stability.`});
  pool.push({id:"rest",icon:"💤",title:"Rest & Mobility",badge:"Rest",bb:"#f9fafb",bc:"#6b7280",vol:"—",type:"rest",nutrition:false,desc:`Full rest. 20–30 min foam rolling. 8–9 hrs sleep.`});
  return pool;
}

function weekGuide(w) {
  const rec=isRec(w),ph=phN(w),pk=isPeak(w);
  if(w===18) return{req:["easy-s","easy-s","easy-s","rest","rest"],opt:[],note:"Race week."};
  if(rec) return{req:["long","str-a","str-b","rest"],opt:["easy-s","vert"],note:"Recovery week."};
  if(ph===1) return{req:["long","str-a","str-b","easy-s","rest"],opt:["easy-s","vert","tempo"],note:"Pick 1 optional."};
  if(ph===2) return{req:["long","b2b","str-a","str-b","easy-s","rest"],opt:["vert","tempo","hills"],note:"6 sessions."};
  if(ph===3&&pk) return{req:["peak","b2b","str-a","str-b","easy-m","rest"],opt:["vert","tempo"],note:"Protect the peak run."};
  if(ph===3) return{req:["long","b2b","str-a","str-b","easy-m","rest"],opt:["vert","tempo","hills"],note:"6 sessions."};
  if(ph===4) return{req:["long","str-a","str-b","easy-m","easy-s","rest"],opt:["b2b","tempo"],note:"B2B/tempo optional."};
  return{req:["easy-s","easy-s","easy-s","str-a","rest"],opt:["tempo"],note:"Taper."};
}

function weekNotes(w){return({1:["Z2 pace ~7:30/km improves naturally — stay below 165 bpm and be patient.","Start staircase work as weekday vert substitute.","4s eccentric lowering from day 1."],2:["Hill sprints at the end of an easy run — never standalone."],3:["Long run ~26 km. Start fueling practice."],4:["Recovery week. Volume −30%. Adaptation locks in here."],5:["Back-to-back runs begin. Test race-day nutrition products from now on."],8:["Recovery week. No B2B."],10:["8–9 hrs sleep non-negotiable. Introduce poles on trail runs."],11:["⚡ First peak long run (35–38 km). Walk every climb."],13:["⚡ Second and final peak long run."],15:["Strength to 1×/week."],17:["Taper madness is normal. Do not add sessions."],18:["Minimal running. Saturday: carb dinner 7pm, bed 9:30pm."]}[w]||[]);}

// ─── LOG MODAL ─────────────────────────────────────────────────
function openLog(weekNum, dayIdx) {
  const key = `w${weekNum}_${dayIdx}`;
  const sched = scheduleCache[key];
  if (!sched) return;
  const pool = buildPool(weekNum);
  const sess = pool.find(s => s.id === sched.session_id);
  if (!sess || sess.type === 'rest') return;
  logCtx = { type: sess.type, sessionId: sess.id, weekNum, dayIdx, sess, tab: 'log' };
  logSets = {}; logRun = { feeling: null };
  const prevLog = logsCache.find(l => l.session_id === sess.id && l.type === 'gym');
  if (sess.type === 'gym' && sess.exercises) {
    const ph = phN(weekNum);
    const isA = sess.id === 'str-a';
    const activeEx = getActiveExercises(sess.id, isA ? STR_LOWER : STR_UPPER, ph);
    logCtx.activeEx = activeEx;
    activeEx.forEach((ex, i) => {
      const m = ex.plan.match(/(\d+)\s*[×x]\s*([\d–]+)/);
      const cnt = m ? parseInt(m[1]) : 3;
      const prev = prevLog?.data?.sets?.[ex.name];
      logSets[i] = Array.from({ length: cnt }, (_, si) => ({ reps: prev?.[si]?.reps || '', weight: prev?.[si]?.weight || '', done: false }));
    });
  }
  document.getElementById('lm-title').textContent = sess.title;
  document.getElementById('lm-sub').textContent = fmtL(dateOfWeek(weekNum, dayIdx));
  renderLogBody();
  document.getElementById('log-overlay').classList.add('open');
}
function closeLog() { document.getElementById('log-overlay').classList.remove('open'); logCtx = null; }

function renderLogBody() {
  if (!logCtx) return;
  const { type, sess } = logCtx;
  let h = '';
  h += `<div class="mtabs">
    <button class="mtab ${logCtx.tab !== 'history' ? 'active' : ''}" onclick="switchLogTab('log')">Log Session</button>
    <button class="mtab ${logCtx.tab === 'history' ? 'active' : ''}" onclick="switchLogTab('history')">History</button>
  </div>`;

  if (logCtx.tab === 'history') {
    const hist = logsCache.filter(l => l.session_id === logCtx.sessionId);
    if (!hist.length) { h += `<div style="text-align:center;color:var(--muted);padding:24px;font-size:13px">No logs yet.</div>`; }

      h += `<div class="log-entry"><div class="log-entry-head"><div>

          sets.forEach(s => { h += `<div class="log-set-chip${s.done ? ' done-set' : ''}">${s.weight ? s.weight + 'kg' : '—'} × ${s.reps || '—'}</div>`; });
          h += `</div>`;
        });
        if (log.data.notes) h += `<div style="font-size:11px;color:var(--muted);margin-top:5px;font-style:italic">"${log.data.notes}"</div>`;
      } else if (log.type === 'run' && log.data) {
        const d = log.data;
        h += `<div class="log-run-grid">`;
        if (d.distance) h += `<div class="lrg-item"><div class="lrg-val">${d.distance}</div><div class="lrg-lbl">km</div></div>`;
        if (d.duration) h += `<div class="lrg-item"><div class="lrg-val">${d.duration}</div><div class="lrg-lbl">time</div></div>`;
        if (d.avgHR) h += `<div class="lrg-item"><div class="lrg-val">${d.avgHR}</div><div class="lrg-lbl">avg HR</div></div>`;
        if (d.pace) h += `<div class="lrg-item"><div class="lrg-val">${d.pace}</div><div class="lrg-lbl">pace/km</div></div>`;
        if (d.elevation) h += `<div class="lrg-item"><div class="lrg-val">${d.elevation}</div><div class="lrg-lbl">D+ m</div></div>`;
        if (d.maxHR) h += `<div class="lrg-item"><div class="lrg-val">${d.maxHR}</div><div class="lrg-lbl">max HR</div></div>`;
        h += `</div>`;
        if (d.feeling != null) h += `<div style="font-size:20px;margin-top:6px">${['😫','😕','😐','😊','🔥'][d.feeling]}</div>`;
        if (d.notes) h += `<div style="font-size:11px;color:var(--muted);margin-top:5px;font-style:italic">"${d.notes}"</div>`;
      }
      h += `</div>`;
    });
  } else if (type === 'gym') {
    const activeEx = logCtx.activeEx || sess.exercises || [];
    activeEx.forEach((ex, i) => {
      const sets = logSets[i] || [];
      const best = getBest(ex.name);
      h += `<div class="ex-log-block"><div class="ex-log-head" style="flex-wrap:wrap;gap:4px"><span style="font-weight:700">${ex.name}</span><div style="display:flex;gap:6px;align-items:center"><span class="explan">${ex.plan}</span><button onclick="openSwapModal('${sess.id}',${i})" style="border:1px solid var(--orange);background:rgba(224,123,57,.08);color:var(--orange);border-radius:5px;padding:2px 7px;font-size:9px;font-weight:700;cursor:pointer">swap</button></div></div>`
        <table class="sets-table"><tr><th style="width:24px" class="tc">Set</th><th>Reps</th><th>Weight (kg)</th><th class="tc">Done</th></tr>`;
      sets.forEach((s, si) => {
        const isPR = best > 0 && parseFloat(s.weight || 0) > best;
        h += `<tr><td class="set-num">${si + 1}</td>
          <td><input class="set-inp" type="number" inputmode="numeric" min="1" max="50" value="${s.reps}" placeholder="—" onchange="setVal(${i},${si},'reps',this.value)"></td>
          <td><input class="set-inp${isPR ? ' pr-glow' : ''}" type="number" inputmode="decimal" step="0.5" min="0" value="${s.weight}" placeholder="—" onchange="setVal(${i},${si},'weight',this.value)">${isPR ? `<span class="pr-badge">PR!</span>` : ''}</td>

      h += `</table><button class="add-set-btn" onclick="addSet(${i})">+ Add Set</button></div>`;
    });
    h += `<div class="rfield full" style="margin-top:10px"><label class="rfield" style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)">Notes</label>

  } else if (type === 'run') {

      <div class="rfield"><label>Avg Pace</label><input type="text" placeholder="e.g. 6:45" value="${logRun.pace || ''}" onchange="logRun.pace=this.value"><div class="unit">min / km</div></div>
      <div class="rfield"><label>Elevation Gain</label><input type="number" inputmode="numeric" placeholder="e.g. 450" value="${logRun.elevation || ''}" onchange="logRun.elevation=this.value"><div class="unit">metres D+</div></div>
      <div class="rfield"><label>Avg Heart Rate</label><input type="number" inputmode="numeric" placeholder="e.g. 148" value="${logRun.avgHR || ''}" onchange="logRun.avgHR=this.value"></div>
      <div class="rfield"><label>Max Heart Rate</label><input type="number" inputmode="numeric" placeholder="e.g. 172" value="${logRun.maxHR || ''}" onchange="logRun.maxHR=this.value"></div>
      <div class="rfield full"><label>How did it feel?</label>
        <div class="feeling-row">${['😫','😕','😐','😊','🔥'].map((e,i) => `<button class="feeling-btn${logRun.feeling===i?' sel':''}" onclick="setFeeling(${i})">${e}</button>`).join('')}</div>
      </div>
      <div class="rfield full"><label>Target Zones</label>
        <div class="hrzones" style="margin-top:4px">${hrZ.map(z=>{const zn=HR_ZONES[z];return zn?`<span class="hz" style="background:${zn.color}22;color:${zn.color};border:1px solid ${zn.color}55">${zn.label} · ${zn.lo}–${zn.hi}</span>`:''}).join('')}</div>
      </div>
      <div class="rfield full"><label>Notes</label>
        <textarea rows="2" placeholder="Terrain, weather, how it felt…" onchange="logRun.notes=this.value" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:13px">${logRun.notes || ''}</textarea>
      </div>
    </div>`;
  }
  document.getElementById('lm-body').innerHTML = h;
}

function switchLogTab(tab) { if (logCtx) { logCtx.tab = tab; renderLogBody(); } }
function setVal(ei, si, f, v) { if (logSets[ei]?.[si]) { logSets[ei][si][f] = v; renderLogBody(); } }
function toggleSet(ei, si) { if (logSets[ei]?.[si]) { logSets[ei][si].done = !logSets[ei][si].done; renderLogBody(); } }
function addSet(ei) { if (!logSets[ei]) logSets[ei] = []; logSets[ei].push({ reps: '', weight: '', done: false }); renderLogBody(); }
function setFeeling(v) { logRun.feeling = v; renderLogBody(); }

async function saveLog() {
  if (!logCtx) return;
  const { type, sessionId, weekNum, dayIdx, sess } = logCtx;
  let data = {};
  if (type === 'gym') {
    const sets = {};
    const activeEx = logCtx.activeEx || sess.exercises || [];
    activeEx.forEach((ex, i) => { sets[ex.name] = logSets[i] || []; });
    data = { sets, notes: logRun.gymNotes || '' };
  } else if (type === 'run') {
    data = { ...logRun };
  }
  const logData = { week_num: weekNum, day_index: dayIdx, session_id: sessionId, session_title: sess.title, type, logged_date: dateOfWeek(weekNum, dayIdx).toISOString().split('T')[0], data };
  await insertLog(logData);
  await setDone(weekNum, dayIdx, true);
  closeLog();
  render();
}

// ─── ASSIGN MODAL ─────────────────────────────────────────────
function openAssign(sid, weekNum) {
  pendingAssign = { sid, weekNum }; selDay = null;
  const pool = buildPool(weekNum);
  const s = pool.find(p => p.id === sid);
  document.getElementById('am-sub').textContent = s ? `"${s.title}"` : '';
  document.getElementById('am-ok').disabled = true;
  const wkS = getWSched(weekNum);
  document.getElementById('dpicker').innerHTML = DAYS.map((d, i) => {
    const dt = dateOfWeek(weekNum, i); const occ = wkS[i] !== undefined;
    return `<div class="dpday${occ ? ' occ' : ''}" data-d="${i}" onclick="pickDay(${i},${occ})"><div class="ddn">${d}</div><div class="ddd">${fmt(dt)}</div></div>`;
  }).join('');
  document.getElementById('assign-overlay').classList.add('open');
}
function pickDay(idx, occ) {
  if (occ) return; selDay = idx;
  document.querySelectorAll('.dpday').forEach(el => el.classList.remove('sel'));
  document.querySelector(`.dpday[data-d="${idx}"]`)?.classList.add('sel');
  document.getElementById('am-ok').disabled = false;
}
async function confirmAssign() {
  if (selDay === null || !pendingAssign) return;
  await upsertSchedule(pendingAssign.weekNum, selDay, pendingAssign.sid);
  closeAssign();
}
function closeAssign() { document.getElementById('assign-overlay').classList.remove('open'); pendingAssign = null; selDay = null; }

// ─── DRAG & DROP ──────────────────────────────────────────────
function dstart(e, sid) { dragSess = sid; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'copy'; }
function dend(e) { e.currentTarget.classList.remove('dragging'); dragSess = null; }
async function ddrop(e, di) { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if (dragSess) await upsertSchedule(curWeek, di, dragSess); }

// ─── RENDER ───────────────────────────────────────────────────
function renderSidebar() {
  let h = '';
  PHASES.forEach(ph => {
    h += `<div class="phase-lbl"><span class="dot" style="background:${ph.dot}"></span>${ph.name}</div>`;
    ph.weeks.forEach(w => {
      const rec=isRec(w),pk=isPeak(w),race=w===18;
      const {t,d}=wCompletion(w); const pct=t>0?Math.round(d/t*100):0;
      const badge=rec?`<span class="stag stag-rec">Easy</span>`:pk?`<span class="stag stag-peak">Peak</span>`:race?`<span class="stag stag-race">Race</span>`:'';
      h+=`<button class="wbtn${w===curWeek?' active':''}" onclick="selWeek(${w})">
        <div><div class="wn">Week ${w}</div><div class="wd">${fmt(dateOfWeek(w))} – ${fmt(dateOfWeek(w,6))}</div></div>
        ${badge}${t>0?`<div class="wprog"><div class="wprog-fill" style="width:${pct}%"></div></div>`:''}
      </button>`;
    });
  });
  document.getElementById('sidebar').innerHTML = h;
}

function render() {
  renderSidebar();
  const w=curWeek; const ps=psStyle(w); const pool=buildPool(w); const guide=weekGuide(w);
  const notes=weekNotes(w); const pm=getPhase(w); const wkS=getWSched(w);
  const {t,d}=wCompletion(w); const today=new Date();
  let h='';
  if(w===18){h+=`<div class="race-hero"><div style="font-size:36px;margin-bottom:8px">🏔️</div><h1>RACE WEEK</h1><p>Eiger Ultra E51 · 51 km · 3,100 m D+<br>July 19, 2026 · 13h limit</p></div>`;}
  h+=`<div class="whero"><div><div class="whead">Week ${w}</div><div class="wsub">${fmtL(dateOfWeek(w))} — ${fmtL(dateOfWeek(w,6))} · ${pm.name}</div></div>
    <div class="krow">
      <div class="kpi"><div class="kv">${getVol(w).replace(" km","")}</div><div class="kl">Volume</div></div>
      <div class="kpi acc"><div class="kv">${w}</div><div class="kl">of 18</div></div>
      ${isRec(w)?`<div class="kpi" style="border-color:#d8b4fe"><div class="kv" style="color:#6b3fa0">−30%</div><div class="kl">Volume</div></div>`:''}
    </div>
  </div>`;
  h+=`<div class="pbanner" style="background:${ps.bg};border-color:${ps.bd};color:${ps.tc}">
    <div class="pbi">${pm.icon}</div>
    <div><div class="pbt">${pm.name}${isRec(w)?" · Recovery":isPeak(w)?" · Peak ⚡":""}</div><div class="pbd">${psDesc(w)}</div></div>
  </div>`;

  // Schedule grid
  h+=`<div class="sh">Weekly Schedule ${t>0?`<span style="font-size:10px;color:#34d399;font-weight:600;text-transform:none;letter-spacing:0">${d}/${t} done</span>`:''}</div>`;
  if(t>0) h+=`<div class="cbar-wrap"><div class="cbar-fill" style="width:${Math.round(d/t*100)}%"></div></div><div class="clbl">${d} of ${t} completed</div>`;
  h+=`<div style="margin-top:10px"></div><div class="sgrid">`;
  DAYS.forEach((dn,i)=>{
    const dt=dateOfWeek(w,i); const isToday=dt.toDateString()===today.toDateString();
    const asgn=wkS[i]; const sess=asgn?pool.find(p=>p.id===asgn.session_id):null;
    h+=`<div class="dslot${asgn?' has-s':''}${asgn?.done?' done-s':''}${isToday?' today':''}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="ddrop(event,${i})">
      <div class="dslot-day">${dn}</div><div class="dslot-date">${fmt(dt)}</div>`;
    if(sess){
      const hasLog=logsCache.some(l=>l.week_num===w&&l.day_index==i);
      h+=`<div class="achip" style="background:${sess.bb||'#f0f0f0'}">
        <div><div class="acht">${sess.icon} ${sess.title.length>20?sess.title.slice(0,20)+'…':sess.title}</div><div class="achv">${sess.vol}</div></div>
        <div class="achbtns">
          ${sess.type!=='rest'?`<button class="achbtn achbtn-log" onclick="openLog(${w},${i})">${hasLog?'📋':'Log'}</button>`:''}
          <button class="achbtn achbtn-done${asgn.done?' is-done':''}" onclick="setDone(${w},${i},${!asgn.done})">${asgn.done?'✓':'Done'}</button>
          <button class="achbtn achbtn-rm" onclick="deleteSchedule(${w},${i})">✕</button>
        </div>
      </div>`;
    } else { h+=`<div class="eslot">Drop or<br>Assign ↓</div>`; }
    h+=`</div>`;
  });
  h+=`</div>`;

  h+=`<div class="pool-intro"><span>🗓️</span><div><strong>Session Pool:</strong> Drag onto slots or click Assign. ${w<18?`<strong>Max 1 Tempo/week.</strong> `:''}${guide.note}</div></div>`;

  const reqIds=[...new Set(guide.req)];
  const reqCounts={}; guide.req.forEach(id=>{reqCounts[id]=(reqCounts[id]||0)+1;});
  const reqSess=reqIds.map(id=>pool.find(s=>s.id===id)).filter(Boolean);
  if(reqSess.length){
    h+=`<div class="sh">Required · ${guide.req.length} sessions</div><div class="scards">`;
    reqSess.forEach(s=>{const used=Object.values(wkS).filter(v=>v.session_id===s.id).length;h+=renderCard(s,used>=reqCounts[s.id],reqCounts[s.id]>1?reqCounts[s.id]:null,w);});
    h+=`</div>`;
  }
  const optSess=guide.opt.map(id=>pool.find(s=>s.id===id)).filter(Boolean);
  if(optSess.length){
    h+=`<div class="sh">Optional — pick 1–2</div><div class="scards">`;
    optSess.forEach(s=>{const used=Object.values(wkS).filter(v=>v.session_id===s.id).length;h+=renderCard(s,used>0,null,w);});
    h+=`</div>`;
  }
  if(notes.length){
    h+=`<div class="sh">Focus Points</div><div class="wnotes">`;
    notes.forEach(n=>{h+=`<div class="nitem"><div class="narr">→</div><div>${n}</div></div>`;});
    h+=`</div>`;
  }
  document.getElementById('content').innerHTML=h;
}

function renderCard(s,used,cnt,w){
  const uid=`c-${s.id}`; const open=!!expanded[uid];
  const cntB=cnt?` <span style="background:#fed7aa;color:#c05a1a;border-radius:3px;padding:1px 4px;font-size:8px;font-weight:700">×${cnt}</span>`:'';
  return `<div class="scard${used?' used':''}" draggable="true" ondragstart="dstart(event,'${s.id}')" ondragend="dend(event)">
    <div class="sc-hdr"><div class="sc-l"><div class="sc-ico">${s.icon}</div>
      <div><div class="sc-ttl">${s.title}${cntB}${used?` <span style="color:#34d399;font-size:9px">✓</span>`:''}</div><div class="sc-vol">${s.vol}</div></div>
    </div>
    <div class="sc-r">
      <button class="sc-asgn" onclick="openAssign('${s.id}',${w})">Assign</button>
      <div class="sc-exp" onclick="toggleCard('${uid}')">${open?'▲':'▼'}</div>
    </div></div>
    <div class="sc-body${open?' open':''}" id="${uid}">
      <div class="sc-desc">${s.desc}</div>
      ${s.hrZones?.length?`<div class="hrzones">${s.hrZones.map(z=>{const zn=HR_ZONES[z];return zn?`<span class="hz" style="background:${zn.color}22;color:${zn.color};border:1px solid ${zn.color}55">${zn.label} · ${zn.lo}–${zn.hi}</span>`:''}).join('')}</div>`:''}
      ${s.exercises?`<table class="extbl">${s.exercises.map(e=>`<tr><td class="exd"><span></span></td><td class="exn">${e.name}</td><td class="exs">${e.plan}</td></tr>`).join('')}</table>`:''}
      ${s.nutrition?`<div class="nutnote">🧃 Fuel every 30–40 min. Target 60–90g carbs/hr.</div>`:''}
    </div>
  </div>`;
}

function toggleCard(uid){expanded[uid]=!expanded[uid];const el=document.getElementById(uid);if(el)el.className='sc-body'+(expanded[uid]?' open':'');const btn=el?.previousElementSibling?.querySelector('.sc-exp');if(btn)btn.textContent=expanded[uid]?'▲':'▼';}
function selWeek(w){curWeek=w;expanded={};render();document.getElementById('content').scrollTop=0;}

// ─── BOOT ─────────────────────────────────────────────────────
document.getElementById('assign-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeAssign();});
document.getElementById('swap-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeSwapModal();});
document.getElementById('log-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeLog();});
document.getElementById('auth-email').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('auth-password').focus();});
document.getElementById('auth-password').addEventListener('keydown',e=>{if(e.key==='Enter')submitAuth();});

function updateCountdown(){const diff=Math.ceil((RACE_DATE-new Date())/86400000);const el=document.getElementById('cd');if(el)el.textContent=diff>0?diff:'🏁';}
function cwn(){const now=new Date();for(let w=1;w<=18;w++){if(now>=dateOfWeek(w)&&now<=dateOfWeek(w,6))return w;}return now<START_DATE?1:18;}

// Handle GitHub Pages 404 redirect for auth callbacks
(function() {
  const redirect = sessionStorage.getItem('redirect');
  if (redirect) {
    sessionStorage.removeItem('redirect');
    const url = new URL(redirect);
    if (url.hash) window.location.hash = url.hash;
  }
})();

// Auth state listener — single source of truth for showing app vs login
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    document.getElementById('auth-screen').classList.remove('visible');
    document.getElementById('app').style.display = 'block';
    updateCountdown();
    curWeek = cwn();
    await loadAllData();
  } else {
    currentUser = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-screen').classList.add('visible');
  }
});

// PWA service worker
if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
</script>
