<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eiger E51">
<meta name="theme-color" content="#0f1923">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Eiger Ultra E51</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#0f1923;--blue:#1A3C6E;--blue-mid:#2a5fa8;
  --orange:#E07B39;--orange-l:#f5a96a;
  --cream:#f8f5f0;--muted:#6b7280;--border:#e5e0d8;
  --green:#2e7d5e;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--ink);min-height:100vh;overscroll-behavior:none;}
input,textarea{font-family:inherit;}

/* ── AUTH ── */
#auth-screen{display:none;position:fixed;inset:0;background:var(--ink);z-index:1000;align-items:center;justify-content:center;flex-direction:column;padding:32px;}
#auth-screen.show{display:flex;}
.acard{background:#161f2e;border:1px solid #1e2d42;border-radius:20px;padding:32px;width:100%;max-width:360px;text-align:center;}
.alogo{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:4px;color:white;margin-bottom:4px;}
.alogo span{color:var(--orange);}
.asub{font-size:13px;color:#7090b0;margin-bottom:28px;line-height:1.5;}
.albl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#4a6080;text-align:left;margin-bottom:6px;display:block;}
.ainp{width:100%;border:1px solid #2a3a50;border-radius:10px;padding:13px 14px;font-size:15px;color:white;background:#0f1923;margin-bottom:14px;}
.ainp:focus{outline:none;border-color:var(--orange);}
.abtn{width:100%;padding:14px;background:var(--orange);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.abtn:disabled{opacity:.45;cursor:not-allowed;}
.amsg{font-size:12px;margin-top:14px;line-height:1.5;min-height:18px;}
.amsg.ok{color:#34d399;}.amsg.err{color:#f87171;}

/* ── TOP BAR ── */
.topbar{background:var(--ink);padding:0 16px;padding-top:var(--safe-top);display:flex;align-items:center;justify-content:space-between;height:calc(52px + var(--safe-top));border-bottom:1px solid #1e2d42;position:sticky;top:0;z-index:200;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:3px;color:white;}
.logo span{color:var(--orange);}
.topright{display:flex;align-items:center;gap:10px;}
.cdpill{display:flex;align-items:center;gap:6px;background:rgba(224,123,57,.1);border:1px solid rgba(224,123,57,.22);border-radius:7px;padding:4px 10px;}
.cdnum{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--orange);line-height:1;}
.cdlbl{font-size:8px;color:rgba(245,169,106,.55);letter-spacing:1px;text-transform:uppercase;}
.syncdot{width:7px;height:7px;border-radius:50%;background:#34d399;flex-shrink:0;}
.syncdot.spin{background:var(--orange);animation:pulse .8s infinite;}
.syncdot.off{background:#6b7280;}
.syncdot.err{background:#f87171;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.userbtn{border:none;background:rgba(255,255,255,.06);color:#7090b0;border-radius:7px;padding:6px 10px;font-size:11px;cursor:pointer;}

/* ── LAYOUT ── */
.main{display:grid;grid-template-columns:220px 1fr;height:calc(100vh - 52px - var(--safe-top));}
.sidebar{background:#131c28;overflow-y:auto;border-right:1px solid #1e2d42;-webkit-overflow-scrolling:touch;}
.content{background:var(--cream);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.ci{padding:20px 22px;max-width:860px;}

/* ── SIDEBAR ── */
.plbl{padding:12px 14px 4px;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#3a5070;display:flex;align-items:center;gap:5px;}
.pdot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.wbtn{width:100%;padding:11px 14px 11px 20px;display:flex;align-items:center;justify-content:space-between;border:none;background:transparent;cursor:pointer;text-align:left;position:relative;}
.wbtn:hover{background:rgba(255,255,255,.03);}
.wbtn.on{background:rgba(26,60,110,.3);border-left:2px solid #4a8fe8;}
.wbtn .wn{font-size:12px;color:#7090b0;}
.wbtn.on .wn{color:#c8dcf4;font-weight:600;}
.wbtn .wd{font-size:9px;color:#3a5070;font-family:'DM Mono',monospace;}
.wbtn.on .wd{color:#5880a8;}
.wbar{position:absolute;bottom:0;left:20px;right:0;height:2px;background:#1e2d42;}
.wbar-fill{height:100%;background:#34d399;border-radius:1px;}
.stag{font-size:7px;font-weight:700;letter-spacing:.8px;border-radius:3px;padding:2px 4px;text-transform:uppercase;}
.stag-r{background:rgba(107,63,160,.25);color:#b08de0;}
.stag-p{background:rgba(224,123,57,.25);color:var(--orange-l);}
.stag-rc{background:rgba(185,28,28,.3);color:#fca5a5;}

/* ── WEEK HERO ── */
.whero{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:10px;}
.whead{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--blue);letter-spacing:2px;line-height:1;}
.wsub{font-size:11px;color:var(--muted);margin-top:2px;}
.krow{display:flex;gap:7px;flex-wrap:wrap;}
.kpi{background:white;border:1px solid var(--border);border-radius:8px;padding:7px 11px;text-align:center;min-width:64px;}
.kv{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--blue);line-height:1;}
.kl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:1px;}

/* ── PHASE BANNER ── */
.pbanner{border-radius:9px;padding:10px 14px;margin-bottom:16px;border-left:3px solid;display:flex;align-items:flex-start;gap:8px;}
.pbi{font-size:15px;flex-shrink:0;margin-top:1px;}
.pbt{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:2px;}
.pbd{font-size:11px;line-height:1.5;opacity:.9;}

/* ── SECTION HEADER ── */
.sh{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin:18px 0 8px;display:flex;align-items:center;gap:8px;}
.sh::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── SCHEDULE GRID ── */
.sgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:10px;}
.dslot{background:white;border:2px dashed #ddd;border-radius:9px;min-height:94px;padding:6px;display:flex;flex-direction:column;}
.dslot.over{border-color:var(--orange);background:#fff8f3;}
.dslot.has{border-style:solid;border-color:var(--border);}
.dslot.done{border-color:#34d399;background:#f0fdf8;}
.dslot.today{border-color:rgba(224,123,57,.4);}
.dday{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.dslot.today .dday{color:var(--orange);}
.ddate{font-size:8px;color:#bbb;font-family:'DM Mono',monospace;margin-bottom:3px;}
.achip{flex:1;border-radius:6px;padding:4px 5px;display:flex;flex-direction:column;justify-content:space-between;min-height:46px;}
.atitle{font-size:9px;font-weight:600;line-height:1.2;color:var(--ink);}
.avol{font-size:8px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:1px;}
.abtns{display:flex;gap:3px;margin-top:5px;}
.abtn2{flex:1;border:none;border-radius:6px;padding:6px 0;font-size:9px;font-weight:700;cursor:pointer;text-transform:uppercase;}
.alog{background:var(--orange);color:white;}
.adone{background:#dcfce7;color:#166534;}
.adone.yes{background:#34d399;color:white;}
.arm{background:#fee2e2;color:#b91c1c;max-width:26px;}
.empty{flex:1;display:flex;align-items:center;justify-content:center;font-size:8px;color:#ccc;text-align:center;line-height:1.3;}

/* ── POOL ── */
.pool-intro{background:#fffbf5;border:1px solid #f0d9bc;border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:11px;color:#7a4a18;display:flex;gap:6px;line-height:1.5;}
.scards{display:flex;flex-direction:column;gap:8px;}
.scard{background:white;border:1px solid var(--border);border-radius:11px;overflow:hidden;cursor:grab;}
.scard:active{cursor:grabbing;}
.scard.used{opacity:.55;}
.scard.drag{opacity:.4;}
.schdr{padding:14px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.scl{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.scico{font-size:18px;flex-shrink:0;}
.sctitle{font-size:13px;font-weight:600;color:var(--ink);line-height:1.2;}
.scvol{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.scr{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.scassign{padding:8px 14px;border-radius:8px;border:1px solid var(--orange);background:rgba(224,123,57,.08);color:var(--orange);font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;}
.scexp{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;}
.scbody{display:none;padding:0 14px 12px;border-top:1px solid #f3f0ea;}
.scbody.open{display:block;padding-top:10px;}
.scdesc{font-size:11px;color:var(--muted);line-height:1.65;margin-bottom:8px;}
.hrzones{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.hz{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;}
.extbl{width:100%;border-collapse:collapse;}
.extbl tr{border-bottom:1px solid #f3f0ea;}
.extbl tr:last-child{border-bottom:none;}
.extbl td{padding:5px 0;font-size:11px;}
.exd{width:14px;}.exd span{width:4px;height:4px;border-radius:50%;background:var(--orange);display:inline-block;}
.exn{color:var(--ink);font-weight:500;}
.exs{color:var(--muted);font-family:'DM Mono',monospace;font-size:10px;text-align:right;}
.nutnote{background:#fff8f0;border:1px solid #fad5bc;border-radius:6px;padding:7px 10px;font-size:10px;color:#854d0e;display:flex;gap:5px;margin-top:7px;line-height:1.5;}

/* ── FOCUS NOTES ── */
.wnotes{background:white;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:8px;}
.nitem{display:flex;gap:8px;padding:6px 0;font-size:11px;color:#333;border-bottom:1px solid #f3f0ea;line-height:1.5;}
.nitem:last-child{border-bottom:none;}
.narr{color:var(--orange);font-weight:700;flex-shrink:0;}

/* ── PROGRESS ── */
.cbar{background:#eee;border-radius:3px;height:5px;overflow:hidden;margin-top:5px;}
.cbar-fill{height:100%;background:#34d399;border-radius:3px;}
.clbl{font-size:9px;color:var(--muted);margin-top:3px;}

/* ── OVERLAYS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:white;border-radius:18px 18px 0 0;width:100%;max-width:520px;max-height:92vh;display:flex;flex-direction:column;padding-bottom:var(--safe-bot);}
.mtop{padding:18px 18px 0;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0;}
.mtop h3{font-size:17px;font-weight:700;color:var(--ink);line-height:1.2;}
.msub{font-size:11px;color:var(--muted);margin-top:2px;}
.mclose{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--cream);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mbody{overflow-y:auto;padding:14px 18px;flex:1;-webkit-overflow-scrolling:touch;}
.mfoot{padding:12px 18px;border-top:1px solid var(--border);flex-shrink:0;}
.mtabs{display:flex;border:1px solid var(--border);border-radius:9px;overflow:hidden;margin-bottom:14px;}
.mtab{flex:1;padding:11px 0;text-align:center;font-size:12px;font-weight:600;border:none;background:white;cursor:pointer;color:var(--muted);}
.mtab.on{background:var(--blue);color:white;}

/* ── GYM LOG ── */
.exblock{margin-bottom:14px;border:1px solid var(--border);border-radius:11px;overflow:hidden;}
.exhead{background:#f8f5f0;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.exname{font-size:13px;font-weight:600;color:var(--ink);}
.exright{display:flex;align-items:center;gap:7px;}
.explan{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.swapbtn{padding:6px 11px;border:1px solid var(--blue-mid);background:rgba(42,95,168,.08);color:var(--blue-mid);border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;}
.stbl{width:100%;border-collapse:collapse;}
.stbl th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:7px 8px;text-align:left;border-bottom:1px solid var(--border);}
.stbl th.c{text-align:center;}
.stbl td{padding:6px 7px;border-bottom:1px solid #f5f5f5;vertical-align:middle;}
.stbl tr:last-child td{border-bottom:none;}
.snum{font-size:11px;font-weight:600;color:var(--muted);text-align:center;width:28px;}
.sinp{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 6px;font-size:15px;font-weight:600;text-align:center;color:var(--ink);background:white;-webkit-appearance:none;}
.sinp:focus{outline:none;border-color:var(--orange);}
.sinp.pr{border-color:#34d399;background:#f0fdf8;}
.scb{width:36px;height:36px;border:2px solid var(--border);border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:white;margin:0 auto;}
.scb.ck{background:var(--green);border-color:var(--green);}
.scb.ck::after{content:'✓';color:white;font-size:15px;font-weight:700;}
.prbadge{font-size:8px;font-weight:700;background:#fef08a;color:#854d0e;border-radius:3px;padding:1px 4px;margin-left:3px;}
.addset{width:100%;padding:9px;border:none;background:transparent;color:var(--orange);font-size:11px;font-weight:600;cursor:pointer;border-top:1px solid var(--border);}

/* ── RUN LOG ── */
.rfields{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rf{display:flex;flex-direction:column;gap:4px;}
.rf.full{grid-column:1/-1;}
.rf label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.rf input,.rf textarea{border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:14px;color:var(--ink);background:white;-webkit-appearance:none;}
.rf input:focus,.rf textarea:focus{outline:none;border-color:var(--orange);}
.rf textarea{resize:none;min-height:56px;line-height:1.5;}
.runit{font-size:9px;color:var(--muted);margin-top:1px;}
.feelrow{display:flex;gap:6px;margin-top:4px;}
.feelbtn{flex:1;border:2px solid var(--border);border-radius:9px;padding:8px 2px;text-align:center;cursor:pointer;background:white;font-size:20px;}
.feelbtn.on{border-color:var(--orange);background:#fff8f3;}

/* ── LOG HISTORY ── */
.lentry{background:var(--cream);border:1px solid var(--border);border-radius:9px;padding:11px 13px;margin-bottom:8px;}
.lhead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px;}
.ltitle{font-size:12px;font-weight:600;color:var(--ink);}
.ldate{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;}
.ldel{border:none;background:none;color:#ccc;font-size:15px;cursor:pointer;}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;}
.chip{font-size:10px;background:white;border:1px solid var(--border);border-radius:5px;padding:3px 8px;font-family:'DM Mono',monospace;}
.chip.ok{border-color:#34d399;background:#f0fdf8;color:#166534;}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:6px;}
.rgi{text-align:center;background:white;border:1px solid var(--border);border-radius:6px;padding:5px 6px;}
.rgv{font-size:13px;font-weight:600;color:var(--blue);font-family:'DM Mono',monospace;}
.rgl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}

/* ── ASSIGN MODAL ── */
.aoverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;align-items:center;justify-content:center;}
.aoverlay.open{display:flex;}
.amodal{background:white;border-radius:16px;padding:22px;width:310px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.amodal h3{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.amsubtext{font-size:11px;color:var(--muted);margin-bottom:14px;}
.dpick{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px;}
.dday2{border:2px solid var(--border);border-radius:8px;padding:8px 2px;text-align:center;cursor:pointer;background:white;}
.dday2:hover{border-color:var(--orange);}
.dday2.sel{border-color:var(--orange);background:var(--orange);color:white;}
.dday2.occ{opacity:.35;cursor:not-allowed;}
.ddn{font-size:8px;font-weight:700;text-transform:uppercase;}
.ddd{font-size:8px;opacity:.7;font-family:'DM Mono',monospace;margin-top:1px;}
.ambtns{display:flex;gap:7px;}
.ambtn{flex:1;padding:11px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;}
.ambtn-c{background:var(--cream);color:var(--muted);border:1px solid var(--border);}
.ambtn-ok{background:var(--orange);color:white;}
.ambtn-ok:disabled{opacity:.4;cursor:not-allowed;}

/* ── SWAP MODAL ── */
.exopt{border:2px solid var(--border);border-radius:11px;padding:13px 14px;margin-bottom:9px;cursor:pointer;background:white;}
.exopt:active{opacity:.8;}
.exopt.rec{border-color:#34d399;background:#f0fdf8;}
.exopt.cur{border-color:var(--orange);background:#fff8f3;}
.exopt-tags{display:flex;gap:5px;margin-bottom:6px;}
.extag{font-size:8px;font-weight:700;border-radius:3px;padding:2px 6px;text-transform:uppercase;}
.extag-g{background:#dcfce7;color:#166534;}
.extag-o{background:#fff0e0;color:#c05a1a;}
.exopt-name{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:3px;}
.exopt-plan{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:5px;}
.exopt-note{font-size:11px;color:#555;line-height:1.5;}
.resetbtn{width:100%;padding:11px;border:1px solid var(--border);border-radius:9px;background:var(--cream);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;}

/* ── SAVE ── */
.savebtn{width:100%;padding:13px;background:var(--blue);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.savebtn:disabled{opacity:.4;cursor:not-allowed;}

/* ── RACE HERO ── */
.racehero{background:linear-gradient(135deg,var(--blue) 0%,#081426 100%);border-radius:13px;padding:28px;text-align:center;margin-bottom:16px;}
.racehero h1{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--orange);letter-spacing:5px;line-height:1;}
.racehero p{color:rgba(255,255,255,.65);font-size:12px;margin-top:5px;line-height:1.6;}

@media(max-width:640px){
  .main{grid-template-columns:1fr;height:auto;}
  .sidebar{display:flex;overflow-x:auto;overflow-y:hidden;height:52px;padding:0 6px;border-right:none;border-bottom:1px solid #1e2d42;align-items:center;gap:3px;}
  .plbl{display:none;}
  .wbtn{padding:5px 9px;border-radius:5px;white-space:nowrap;min-width:58px;}
  .ci{padding:14px 13px;}
  .rfields{grid-template-columns:1fr;}
  .rf.full{grid-column:1;}
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="show">
  <div class="acard">
    <div class="alogo">EIGER <span>E51</span></div>
    <div class="asub">Your 18-week race preparation.<br>Sign in to sync across all devices.</div>
    <label class="albl" id="amodelbl">Sign In</label>
    <input class="ainp" type="email" id="aemail" placeholder="you@example.com" autocomplete="email">
    <input class="ainp" type="password" id="apw" placeholder="••••••••" autocomplete="current-password">

async function loadAll(){

    var r2=await sb.from('session_logs').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
    schedCache={};
    (r1.data||[]).forEach(function(r){schedCache[sk(r.week_num,r.day_index)]=r;});
    logsCache=r2.data||[];
    toLocal();setSyncState('','synced');
  }catch(e){fromLocal();setSyncState('off','offline');}
  render();
}
async function upsertSched(w,di,sid,done){
  if(done===undefined)done=false;
  var key=sk(w,di),ex=schedCache[key];
  var row={user_id:user.id,week_num:w,day_index:di,session_id:sid,done:done,updated_at:new Date().toISOString()};
  schedCache[key]=Object.assign({},row,{id:ex?ex.id:undefined});
  toLocal();render();setSyncState('spin','saving…');
  try{
    if(ex&&ex.id){await sb.from('schedule').update({session_id:sid,done:done,updated_at:row.updated_at}).eq('id',ex.id);}
    else{var ins=await sb.from('schedule').insert(row).select().single();if(ins.data)schedCache[key]=ins.data;}
    setSyncState('','synced');
  }catch(e){setSyncState('err','sync error');}
  toLocal();
}
async function delSched(w,di){
  var key=sk(w,di),ex=schedCache[key];
  delete schedCache[key];toLocal();render();
  if(ex&&ex.id){setSyncState('spin','saving…');try{await sb.from('schedule').delete().eq('id',ex.id);setSyncState('','synced');}catch(e){setSyncState('err','sync error');}}
}
async function setDone(w,di,done){
  var key=sk(w,di);if(!schedCache[key])return;
  schedCache[key].done=done;toLocal();render();setSyncState('spin','saving…');
  try{await sb.from('schedule').update({done:done,updated_at:new Date().toISOString()}).eq('id',schedCache[key].id);setSyncState('','synced');}
  catch(e){setSyncState('err','sync error');}
}
async function addLog(data){
  var row=Object.assign({user_id:user.id},data,{created_at:new Date().toISOString()});

}
async function delLog(id){
  logsCache=logsCache.filter(function(l){return l.id!==id;});toLocal();setSyncState('spin','saving…');

}

  pool.push({id:'rest',icon:'💤',title:'Rest & Mobility',bb:'#f9fafb',vol:'—',type:'rest',nutr:false,desc:'Full rest. 20–30 min foam rolling. 8–9 hrs sleep.'});
  return pool;
}
function weekGuide(w){
  var rec=isRec(w),ph=phN(w),pk=isPeak(w);
  if(w===18)return{req:['easy-s','easy-s','easy-s','rest','rest'],opt:[],note:'Race week.'};
  if(rec)return{req:['long','str-a','str-b','rest'],opt:['easy-s','vert'],note:'Recovery week.'};
  if(ph===1)return{req:['long','str-a','str-b','easy-s','rest'],opt:['easy-s','vert','tempo'],note:'Pick 1 optional.'};
  if(ph===2)return{req:['long','b2b','str-a','str-b','easy-s','rest'],opt:['vert','tempo','hills'],note:'6 sessions.'};
  if(ph===3&&pk)return{req:['peak','b2b','str-a','str-b','easy-m','rest'],opt:['vert','tempo'],note:'Protect the peak run.'};
  if(ph===3)return{req:['long','b2b','str-a','str-b','easy-m','rest'],opt:['vert','tempo','hills'],note:'6 sessions.'};
  if(ph===4)return{req:['long','str-a','str-b','easy-m','easy-s','rest'],opt:['b2b','tempo'],note:'B2B/tempo optional.'};
  return{req:['easy-s','easy-s','easy-s','str-a','rest'],opt:['tempo'],note:'Taper.'};
}
function weekNotes(w){
  var m={1:['Z2 pace ~7:30/km improves naturally — stay below 165 bpm and be patient.','Start staircase work as weekday vert substitute.','4s eccentric lowering from day 1.'],2:['Hill sprints at end of easy run only — never standalone.'],3:['Long run ~26 km. Start fueling practice.'],4:['Recovery week. Volume −30%. Adaptation locks in here.'],5:['Back-to-back runs begin. Test race-day nutrition from now on.'],8:['Recovery week. No B2B.'],10:['8–9 hrs sleep non-negotiable. Introduce poles on trail runs.'],11:['⚡ First peak long run (35–38 km). Walk every climb.'],13:['⚡ Second and final peak long run.'],15:['Strength to 1×/week.'],17:['Taper madness is normal. Do not add sessions.'],18:['Minimal running. Saturday: carb dinner 7pm, bed 9:30pm.']};
  return m[w]||[];
}

// ════════════════════════════════════════════════════════
// Use a store to avoid any inline JSON / quoting issues
var EXSTORE={};
function storeEx(ex){var k='k'+Math.random().toString(36).slice(2,8);EXSTORE[k]=ex;return k;}

function openSwap(sid,idx){
  swapCtx={sid:sid,idx:idx};
  var isA=sid==='str-a', lib=isA?EX.A[idx]:EX.B[idx];
  if(!lib)return;
  var ph=logCtx?phN(logCtx.w):1;
  var active=getActiveEx(sid,ph);
  var curName=active[idx]?active[idx].name:'';
  var all=[lib.rec].concat(lib.alt);
  var h='';
  all.forEach(function(ex){
    var isRecOpt=(ex===lib.rec);
    var isCur=(ex.n===curName);
    var cls='exopt'+(isCur?' cur':isRecOpt?' rec':'');
    var tags='';
    if(isRecOpt&&isCur)tags='<span class="extag extag-g">✓ Active — Recommended</span>';
    else if(isRecOpt)tags='<span class="extag extag-g">Recommended</span>';
    else if(isCur)tags='<span class="extag extag-o">Current</span>';
    var key=storeEx({name:ex.n,plan:ex.p,note:ex.note||lib.note});
    h+='<div class="'+cls+'" onclick="pickEx(\''+key+'\')">';
    if(tags)h+='<div class="exopt-tags">'+tags+'</div>';
    h+='<div class="exopt-name">'+ex.n+'</div>';
    h+='<div class="exopt-plan">'+ex.p+'</div>';
    h+='<div class="exopt-note">'+(ex.note||lib.note)+'</div>';
    h+='</div>';
  });
  h+='<button class="resetbtn" onclick="resetEx(\''+sid+'\')">↺ Reset all exercises to recommended</button>';
  document.getElementById('swap-body').innerHTML=h;
  document.getElementById('swap-overlay').classList.add('open');
}
function pickEx(key){
  var ex=EXSTORE[key];
  if(!ex||!swapCtx)return;
  var sid=swapCtx.sid,idx=swapCtx.idx;
  var base=sid==='str-a'?BASE_A:BASE_B;
  if(!customEx[sid])customEx[sid]=base.map(function(e){return{name:e.name,plan:e.plan};});
  customEx[sid][idx]={name:ex.name,plan:ex.plan};
  saveCustomEx();
  if(logCtx){
    var m=ex.plan.match(/(\d+)\s*[×x]\s*([\d–]+)/);
    var cnt=m?parseInt(m[1]):3;
    logSets[idx]=[];for(var i=0;i<cnt;i++)logSets[idx].push({reps:'',weight:'',done:false});
    logCtx.activeEx=getActiveEx(sid,phN(logCtx.w));
  }
  closeSwap();renderLog();
}
function resetEx(sid){
  delete customEx[sid];saveCustomEx();
  if(logCtx){
    var base=sid==='str-a'?BASE_A:BASE_B;
    base.forEach(function(ex,i){
      var m=ex.plan.match(/(\d+)\s*[×x]\s*([\d–]+)/);
      var cnt=m?parseInt(m[1]):3;
      logSets[i]=[];for(var j=0;j<cnt;j++)logSets[i].push({reps:'',weight:'',done:false});
    });
    logCtx.activeEx=getActiveEx(sid,phN(logCtx.w));
  }
  closeSwap();renderLog();
}
function closeSwap(){document.getElementById('swap-overlay').classList.remove('open');swapCtx=null;}

function openLog(w,di){
  var key=sk(w,di),sched=schedCache[key];if(!sched)return;
  var pool=buildPool(w),sess=pool.filter(function(s){return s.id===sched.session_id;})[0];
  if(!sess||sess.type==='rest')return;
  var ph=phN(w),activeEx=sess.type==='gym'?getActiveEx(sess.id,ph):null;
  logCtx={type:sess.type,sid:sess.id,w:w,di:di,sess:sess,tab:'log',activeEx:activeEx};
  logSets={};logRun={feeling:null};
  if(sess.type==='gym'&&activeEx){
    var prev=logsCache.filter(function(l){return l.session_id===sess.id&&l.type==='gym';})[0];
    activeEx.forEach(function(ex,i){
      var m=ex.plan.match(/(\d+)\s*[×x]\s*([\d–]+)/),cnt=m?parseInt(m[1]):3;
      var pd=prev&&prev.data&&prev.data.sets&&prev.data.sets[ex.name];
      logSets[i]=[];
      for(var j=0;j<cnt;j++)logSets[i].push({reps:pd&&pd[j]?pd[j].reps:'',weight:pd&&pd[j]?pd[j].weight:'',done:false});
    });
  }
  document.getElementById('lm-title').textContent=sess.title;
  document.getElementById('lm-sub').textContent=fmtL(dOfW(w,di));
  renderLog();
  document.getElementById('log-overlay').classList.add('open');
}
function closeLog(){document.getElementById('log-overlay').classList.remove('open');logCtx=null;}

function renderLog(){
  if(!logCtx)return;
  var type=logCtx.type,sess=logCtx.sess;
  var h='<div class="mtabs"><button class="mtab'+(logCtx.tab!=='hist'?' on':'')+'" onclick="logTab(\'log\')">Log Session</button><button class="mtab'+(logCtx.tab==='hist'?' on':'')+'" onclick="logTab(\'hist\')">History</button></div>';

  if(logCtx.tab==='hist'){
    var hist=logsCache.filter(function(l){return l.session_id===logCtx.sid;});
    if(!hist.length)h+='<div style="text-align:center;color:var(--muted);padding:24px;font-size:13px">No logs yet.</div>';
    hist.forEach(function(log){
      h+='<div class="lentry"><div class="lhead"><div><div class="ltitle">'+(log.session_title||sess.title)+'</div><div class="ldate">'+new Date(log.created_at).toLocaleDateString('en-CH',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+'</div></div><button class="ldel" onclick="delLog(\''+log.id+'\')">🗑</button></div>';
      if(log.type==='gym'&&log.data&&log.data.sets){
        Object.keys(log.data.sets).forEach(function(ename){
          var sets=log.data.sets[ename];
          h+='<div style="font-size:10px;font-weight:600;color:var(--muted);margin-top:6px;margin-bottom:3px">'+ename+'</div><div class="chips">';
          sets.forEach(function(s){h+='<div class="chip'+(s.done?' ok':'')+'">'+( s.weight?s.weight+'kg':'—')+' × '+(s.reps||'—')+'</div>';});
          h+='</div>';
        });
        if(log.data.notes)h+='<div style="font-size:11px;color:var(--muted);margin-top:5px;font-style:italic">"'+log.data.notes+'"</div>';
      }else if(log.type==='run'&&log.data){
        var d=log.data;
        h+='<div class="rgrid">';
        if(d.distance)h+='<div class="rgi"><div class="rgv">'+d.distance+'</div><div class="rgl">km</div></div>';
        if(d.duration)h+='<div class="rgi"><div class="rgv">'+d.duration+'</div><div class="rgl">time</div></div>';
        if(d.avgHR)h+='<div class="rgi"><div class="rgv">'+d.avgHR+'</div><div class="rgl">avg HR</div></div>';
        if(d.pace)h+='<div class="rgi"><div class="rgv">'+d.pace+'</div><div class="rgl">pace/km</div></div>';
        if(d.elevation)h+='<div class="rgi"><div class="rgv">'+d.elevation+'</div><div class="rgl">D+ m</div></div>';
        if(d.maxHR)h+='<div class="rgi"><div class="rgv">'+d.maxHR+'</div><div class="rgl">max HR</div></div>';
        h+='</div>';
        if(d.feeling!=null)h+='<div style="font-size:22px;margin-top:6px">'+['😫','😕','😐','😊','🔥'][d.feeling]+'</div>';
        if(d.notes)h+='<div style="font-size:11px;color:var(--muted);margin-top:5px;font-style:italic">"'+d.notes+'"</div>';
      }
      h+='</div>';
    });
  }else if(type==='gym'){
    var aex=logCtx.activeEx||[];
    aex.forEach(function(ex,i){
      var sets=logSets[i]||[],best=getBest(ex.name);
      h+='<div class="exblock"><div class="exhead"><span class="exname">'+ex.name+'</span><div class="exright"><span class="explan">'+ex.plan+'</span><button class="swapbtn" onclick="openSwap(\''+logCtx.sid+'\','+i+')">⇄ Swap</button></div></div>';
      h+='<table class="stbl"><tr><th style="width:28px" class="c">#</th><th>Reps</th><th>Weight (kg)</th><th class="c">Done</th></tr>';
      sets.forEach(function(s,si){
        var isPR=best>0&&parseFloat(s.weight||0)>best;
        h+='<tr><td class="snum">'+(si+1)+'</td>';
        h+='<td><input class="sinp" type="number" inputmode="numeric" min="1" max="50" value="'+s.reps+'" placeholder="—" onchange="sv('+i+','+si+',\'reps\',this.value)"></td>';
        h+='<td><input class="sinp'+(isPR?' pr':'')+'" type="number" inputmode="decimal" step="0.5" min="0" value="'+s.weight+'" placeholder="—" onchange="sv('+i+','+si+',\'weight\',this.value)">'+(isPR?'<span class="prbadge">PR!</span>':'')+'</td>';
        h+='<td><div class="scb'+(s.done?' ck':'')+'" onclick="ts('+i+','+si+')"></div></td></tr>';
      });
      h+='</table><button class="addset" onclick="as('+i+')">+ Add Set</button></div>';
    });
    h+='<div style="margin-top:10px"><div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:5px">Notes</div><textarea placeholder="Notes on today\'s session…" onchange="logRun.gymNotes=this.value" rows="2" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px">'+(logRun.gymNotes||'')+'</textarea></div>';
  }else if(type==='run'){
    var hrz=sess.hrz||[];
    h+='<div class="rfields">';
    h+='<div class="rf"><label>Distance (km)</label><input type="number" inputmode="decimal" step="0.1" placeholder="e.g. 12.4" value="'+(logRun.distance||'')+'" onchange="logRun.distance=this.value"><div class="runit">kilometres</div></div>';
    h+='<div class="rf"><label>Duration</label><input type="text" placeholder="e.g. 1:23:45" value="'+(logRun.duration||'')+'" onchange="logRun.duration=this.value"><div class="runit">hh:mm:ss</div></div>';
    h+='<div class="rf"><label>Avg Pace</label><input type="text" placeholder="e.g. 6:45" value="'+(logRun.pace||'')+'" onchange="logRun.pace=this.value"><div class="runit">min / km</div></div>';
    h+='<div class="rf"><label>Elevation Gain</label><input type="number" inputmode="numeric" placeholder="e.g. 450" value="'+(logRun.elevation||'')+'" onchange="logRun.elevation=this.value"><div class="runit">metres D+</div></div>';
    h+='<div class="rf"><label>Avg Heart Rate</label><input type="number" inputmode="numeric" placeholder="e.g. 148" value="'+(logRun.avgHR||'')+'" onchange="logRun.avgHR=this.value"></div>';
    h+='<div class="rf"><label>Max Heart Rate</label><input type="number" inputmode="numeric" placeholder="e.g. 172" value="'+(logRun.maxHR||'')+'" onchange="logRun.maxHR=this.value"></div>';
    h+='<div class="rf full"><label>How did it feel?</label><div class="feelrow">'+['😫','😕','😐','😊','🔥'].map(function(e,i){return '<button class="feelbtn'+(logRun.feeling===i?' on':'')+'" onclick="sf('+i+')">'+e+'</button>';}).join('')+'</div></div>';
    h+='<div class="rf full"><label>Target Zones</label><div class="hrzones" style="margin-top:4px">'+hrz.map(function(z){var zn=HRZ[z];return zn?'<span class="hz" style="background:'+zn.col+'22;color:'+zn.col+';border:1px solid '+zn.col+'55">'+zn.label+' · '+zn.lo+'–'+zn.hi+'</span>':'';}).join('')+'</div></div>';
    h+='<div class="rf full"><label>Notes</label><textarea rows="2" placeholder="Terrain, weather, how it felt…" onchange="logRun.notes=this.value" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:13px">'+(logRun.notes||'')+'</textarea></div>';
    h+='</div>';
  }
  document.getElementById('lm-body').innerHTML=h;
}

function logTab(t){if(logCtx){logCtx.tab=t;renderLog();}}
function sv(ei,si,f,v){if(logSets[ei]&&logSets[ei][si])logSets[ei][si][f]=v;}
function ts(ei,si){if(logSets[ei]&&logSets[ei][si]){logSets[ei][si].done=!logSets[ei][si].done;renderLog();}}
function as(ei){if(!logSets[ei])logSets[ei]=[];logSets[ei].push({reps:'',weight:'',done:false});renderLog();}
function sf(v){logRun.feeling=v;renderLog();}

async function saveLog(){
  if(!logCtx)return;
  var data={};
  if(logCtx.type==='gym'){
    var sets={};
    (logCtx.activeEx||[]).forEach(function(ex,i){sets[ex.name]=logSets[i]||[];});
    data={sets:sets,notes:logRun.gymNotes||''};
  }else if(logCtx.type==='run'){
    for(var k in logRun)data[k]=logRun[k];
  }
  await addLog({week_num:logCtx.w,day_index:logCtx.di,session_id:logCtx.sid,session_title:logCtx.sess.title,type:logCtx.type,logged_date:dOfW(logCtx.w,logCtx.di).toISOString().split('T')[0],data:data});
  await setDone(logCtx.w,logCtx.di,true);
  closeLog();render();
}

  h+='<div class="pool-intro"><span>🗓️</span><div><strong>Session Pool:</strong> Drag onto slots or click Assign. '+(w<18?'<strong>Max 1 Tempo/week.</strong> ':'')+guide.note+'</div></div>';

  var reqIds=[],reqCounts={};
  guide.req.forEach(function(id){if(reqIds.indexOf(id)<0)reqIds.push(id);reqCounts[id]=(reqCounts[id]||0)+1;});
  var reqSess=reqIds.map(function(id){return pool.filter(function(s){return s.id===id;})[0];}).filter(Boolean);
  if(reqSess.length){
    h+='<div class="sh">Required · '+guide.req.length+' sessions</div><div class="scards">';
    reqSess.forEach(function(s){var used=Object.values(wkS).filter(function(v){return v.session_id===s.id;}).length;h+=renderCard(s,used>=(reqCounts[s.id]||1),reqCounts[s.id]>1?reqCounts[s.id]:null,w);});
    h+='</div>';
  }
  var optSess=guide.opt.map(function(id){return pool.filter(function(s){return s.id===id;})[0];}).filter(Boolean);
  if(optSess.length){
    h+='<div class="sh">Optional — pick 1–2</div><div class="scards">';
    optSess.forEach(function(s){var used=Object.values(wkS).filter(function(v){return v.session_id===s.id;}).length;h+=renderCard(s,used>0,null,w);});
    h+='</div>';
  }
  if(notes.length){
    h+='<div class="sh">Focus Points</div><div class="wnotes">';
    notes.forEach(function(n){h+='<div class="nitem"><div class="narr">→</div><div>'+n+'</div></div>';});
    h+='</div>';
  }
  document.getElementById('content').innerHTML=h;
}

function renderCard(s,used,cnt,w){
  var uid='c-'+s.id,open=!!expanded[uid];
  var cb=cnt?'<span style="background:#fed7aa;color:#c05a1a;border-radius:3px;padding:1px 4px;font-size:8px;font-weight:700">×'+cnt+'</span>':'';
  var h='<div class="scard'+(used?' used':'')+'" draggable="true" ondragstart="dstart(event,\''+s.id+'\')" ondragend="dend(event)">';
  h+='<div class="schdr"><div class="scl"><div class="scico">'+s.icon+'</div><div><div class="sctitle">'+s.title+(cb?' '+cb:'')+(used?' <span style="color:#34d399;font-size:9px">✓</span>':'')+'</div><div class="scvol">'+s.vol+'</div></div></div><div class="scr"><button class="scassign" onclick="openAssign(\''+s.id+'\','+w+')">Assign</button><div class="scexp" onclick="toggleCard(\''+uid+'\')">'+(open?'▲':'▼')+'</div></div></div>';
  h+='<div class="scbody'+(open?' open':'')+'" id="'+uid+'"><div class="scdesc">'+s.desc+'</div>';
  if(s.hrz&&s.hrz.length)h+='<div class="hrzones">'+s.hrz.map(function(z){var zn=HRZ[z];return zn?'<span class="hz" style="background:'+zn.col+'22;color:'+zn.col+';border:1px solid '+zn.col+'55">'+zn.label+' · '+zn.lo+'–'+zn.hi+'</span>':'';}).join('')+'</div>';
  if(s.exercises)h+='<table class="extbl">'+s.exercises.map(function(e){return '<tr><td class="exd"><span></span></td><td class="exn">'+e.name+'</td><td class="exs">'+e.plan+'</td></tr>';}).join('')+'</table>';
  if(s.nutr)h+='<div class="nutnote">🧃 Fuel every 30–40 min. Target 60–90g carbs/hr.</div>';
  h+='</div></div>';
  return h;
}
function toggleCard(uid){
  expanded[uid]=!expanded[uid];
  var el=document.getElementById(uid);if(el)el.className='scbody'+(expanded[uid]?' open':'');
  var btn=el&&el.previousElementSibling&&el.previousElementSibling.querySelector('.scexp');
  if(btn)btn.textContent=expanded[uid]?'▲':'▼';
}
function selWeek(w){curW=w;expanded={};render();document.getElementById('content').scrollTop=0;}

document.getElementById('aoverlay').addEventListener('click',function(e){if(e.target===e.currentTarget)closeAssign();});
document.getElementById('log-overlay').addEventListener('click',function(e){if(e.target===e.currentTarget)closeLog();});
document.getElementById('swap-overlay').addEventListener('click',function(e){if(e.target===e.currentTarget)closeSwap();});
document.getElementById('aemail').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('apw').focus();});
document.getElementById('apw').addEventListener('keydown',function(e){if(e.key==='Enter')doAuth();});

function updateCD(){var diff=Math.ceil((RACE-new Date())/86400000);var el=document.getElementById('cd');if(el)el.textContent=diff>0?diff:'🏁';}
function curWeekNum(){var now=new Date();for(var w=1;w<=18;w++){if(now>=dOfW(w)&&now<=dOfW(w,6))return w;}return now<T0?1:18;}

sb.auth.onAuthStateChange(async function(ev,session){
  if(session&&session.user){
    user=session.user;
    document.getElementById('auth-screen').classList.remove('show');
    document.getElementById('app').style.display='block';
    updateCD();curW=curWeekNum();
    await loadAll();
  }else{
    user=null;
    document.getElementById('app').style.display='none';
    document.getElementById('auth-screen').classList.add('show');
  }
});

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){});}
</script>
